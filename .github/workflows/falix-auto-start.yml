name: Falix Auto Start

on:
  workflow_dispatch:
  repository_dispatch:
    types: [falix-start]

jobs:
  start-server:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y xvfb

      - name: Install Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -qq
          sudo apt-get install -y google-chrome-stable
          google-chrome-stable --version

      - name: Install Node dependencies
        run: |
          npm init -y
          npm install puppeteer-real-browser puppeteer-core

      - name: Run Falix Auto Start
        env:
          FALIX_EMAIL: ${{ secrets.FALIX_EMAIL }}
          FALIX_PASSWORD: ${{ secrets.FALIX_PASSWORD }}
          FALIX_SERVER_ID: ${{ secrets.FALIX_SERVER_ID }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          cat > run.mjs << 'EOF'
          import { connect } from 'puppeteer-real-browser';
          import fs from 'fs';

          const EMAIL      = process.env.FALIX_EMAIL;
          const PASSWORD   = process.env.FALIX_PASSWORD;
          const SERVER_ID  = process.env.FALIX_SERVER_ID;
          const TG_TOKEN   = process.env.TG_TOKEN;
          const TG_CHAT_ID = process.env.TG_CHAT_ID;

          const LOGIN_URL  = 'https://client.falixnodes.net/auth/login';
          const SERVER_URL = `https://client.falixnodes.net/server/${SERVER_ID}/console`;

          const sleep = ms => new Promise(r => setTimeout(r, ms));

          // ── 截图（带步骤名，保存到 /tmp/screenshots/）────────────────────

          const SHOT_DIR = '/tmp/screenshots';
          fs.mkdirSync(SHOT_DIR, { recursive: true });

          async function shot(page, name) {
            const p = `${SHOT_DIR}/${name}.png`;
            try {
              await page.screenshot({ path: p, fullPage: true });
              console.log(`  📸 截图: ${p}`);
            } catch (e) {
              console.log(`  📸 截图失败(${name}): ${e.message}`);
            }
          }

          async function sendTelegram(msg) {
            if (!TG_TOKEN || !TG_CHAT_ID) return;
            try {
              await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: TG_CHAT_ID, text: msg, parse_mode: 'HTML' })
              });
            } catch (e) { console.log('TG 失败:', e.message); }
          }

          async function humanType(page, selector, text) {
            await page.focus(selector);
            await sleep(200);
            for (const char of text) {
              await page.keyboard.type(char, { delay: 40 + Math.random() * 60 });
            }
          }

          async function getServerStatus(page) {
            return page.evaluate(() => {
              function walkText(root) {
                const iter = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
                let node;
                while ((node = iter.nextNode())) {
                  const t = node.textContent.trim().toLowerCase();
                  if (t === 'offline')  return 'offline';
                  if (t === 'starting') return 'starting';
                  if (t === 'online' || t === 'running') return 'online';
                }
                return null;
              }
              for (const sel of ['.server-status', '[class*="status"]', '[class*="badge"]', '.badge']) {
                for (const el of document.querySelectorAll(sel)) {
                  const r = walkText(el);
                  if (r) return r;
                }
              }
              return walkText(document.body) || 'unknown';
            });
          }

          async function dismissAd(page) {
            try {
              const btns = await page.$$('button');
              for (const btn of btns) {
                const txt = (await btn.evaluate(el => el.textContent))?.trim().toLowerCase();
                if (txt === 'cancel') {
                  console.log('  🚫 关闭广告弹窗');
                  await btn.click();
                  await sleep(1000);
                  return true;
                }
              }
            } catch {}
            return false;
          }

          async function clickStart(page) {
            await dismissAd(page);
            const btns = await page.$$('button');
            for (const btn of btns) {
              const txt = (await btn.evaluate(el => el.textContent))?.trim().toLowerCase();
              if (txt === 'start') {
                const box = await btn.boundingBox();
                if (box) {
                  console.log('  ▶️  点击 Start');
                  await page.mouse.move(box.x + box.width / 2, box.y + box.height / 2, { steps: 10 });
                  await sleep(100);
                  await page.mouse.click(box.x + box.width / 2, box.y + box.height / 2);
                  await sleep(2000);
                  await dismissAd(page);
                  return true;
                }
              }
            }
            console.log('  ⚠️  未找到 Start 按钮');
            return false;
          }

          async function main() {
            console.log('🚀 启动浏览器...');
            const { browser, page } = await connect({
              headless: false,
              turnstile: true,
              disableXvfb: false,
              args: [
                '--no-sandbox',
                '--disable-setuid-sandbox',
                '--disable-dev-shm-usage',
                '--disable-gpu',
                '--window-size=1280,800',
                '--lang=zh-CN,zh',
              ],
              customConfig: {
                chromePath: '/usr/bin/google-chrome-stable',
              },
              connectOption: {
                defaultViewport: { width: 1280, height: 800 }
              },
            });
            console.log('✅ 浏览器已启动');

            try {
              // ── 登录页 ────────────────────────────────────────────────────
              console.log('📋 打开登录页...');
              await page.goto(LOGIN_URL, { waitUntil: 'domcontentloaded', timeout: 30000 });
              await sleep(2500);
              await shot(page, '01_login_page');

              // 填邮箱
              console.log('✏️  填写邮箱...');
              await humanType(page, 'input[name="email"], input[type="email"]', EMAIL);
              await sleep(400 + Math.random() * 300);
              await shot(page, '02_after_email');

              // 填密码
              console.log('✏️  填写密码...');
              await humanType(page, 'input[name="password"], input[type="password"]', PASSWORD);
              await sleep(400 + Math.random() * 300);
              await shot(page, '03_after_password');

              // 等 Turnstile
              console.log('🤖 等待 Turnstile...');
              let turnstileOk = false;
              for (let i = 0; i < 20; i++) {
                const ok = await page.evaluate(() => {
                  const inputs = document.querySelectorAll(
                    'input[name="cf-turnstile-response"], textarea[name="cf-turnstile-response"]'
                  );
                  return [...inputs].some(inp => inp.value && inp.value.length > 10);
                }).catch(() => false);
                if (ok) { turnstileOk = true; console.log('  ✅ Turnstile token 已生成'); break; }
                if (i % 5 === 4) {
                  console.log(`  等待中... (${i + 1}/20s)`);
                  await shot(page, `04_turnstile_wait_${i + 1}s`);
                }
                await sleep(1000);
              }
              await shot(page, '05_after_turnstile');

              if (!turnstileOk) console.log('⚠️  Turnstile 未明确通过，继续提交...');

              // 提交登录
              console.log('🔑 点击登录按钮...');
              const loginBtn = await page.$('button[type="submit"]');
              if (loginBtn) {
                await loginBtn.click();
              } else {
                await page.keyboard.press('Enter');
              }

              // 等跳转
              try {
                await page.waitForNavigation({ timeout: 20000, waitUntil: 'domcontentloaded' });
              } catch { await sleep(5000); }

              const afterUrl = page.url();
              console.log('当前 URL:', afterUrl);
              await shot(page, '06_after_login_submit');

              if (afterUrl.includes('/auth/login')) {
                // 截图并打印页面错误提示文字
                const errText = await page.evaluate(() => {
                  const alerts = document.querySelectorAll('.alert, .error, [class*="error"], [class*="alert"], [role="alert"]');
                  return [...alerts].map(el => el.textContent?.trim()).filter(Boolean).join(' | ');
                }).catch(() => '');
                console.log('❌ 登录失败，页面错误信息:', errText || '(未找到错误文字)');
                await sendTelegram(`❌ <b>Falix</b> 登录失败\n错误: ${errText || '未知'}`);
                process.exit(1);
              }
              console.log('✅ 登录成功！');

              // ── 跳转控制台 ─────────────────────────────────────────────────
              console.log(`🖥️  跳转: ${SERVER_URL}`);
              await page.goto(SERVER_URL, { waitUntil: 'domcontentloaded', timeout: 30000 });
              await sleep(3000);
              await shot(page, '07_console_page');

              // ── 状态检测 ───────────────────────────────────────────────────
              const status = await getServerStatus(page);
              console.log(`📊 当前状态: ${status}`);

              if (status === 'starting' || status === 'online') {
                console.log('✅ 服务器运行中，无需操作。');
                await sendTelegram(`✅ <b>Falix</b> 状态 <code>${status}</code>，无需操作。`);
                process.exit(0);
              }

              console.log('🔴 Offline，开始启动...');
              await clickStart(page);
              await shot(page, '08_after_start_click');

              console.log('⏳ 等待 15 秒...');
              await sleep(15000);
              await page.reload({ waitUntil: 'domcontentloaded' });
              await sleep(2000);
              await shot(page, '09_after_15s');

              const status2 = await getServerStatus(page);
              console.log(`📊 15s 后: ${status2}`);

              if (status2 === 'starting' || status2 === 'online') {
                await sendTelegram(`✅ <b>Falix</b> 启动成功，状态: <code>${status2}</code>`);
                console.log('✅ 启动成功！');
              } else {
                console.log('⚠️  再次点击 Start...');
                await clickStart(page);
                await sleep(8000);
                await page.reload({ waitUntil: 'domcontentloaded' });
                await sleep(2000);
                const status3 = await getServerStatus(page);
                console.log(`📊 最终状态: ${status3}`);
                await shot(page, '10_final');
                if (status3 === 'starting' || status3 === 'online') {
                  await sendTelegram(`✅ <b>Falix</b> 二次启动成功，状态: <code>${status3}</code>`);
                } else {
                  await sendTelegram(`⚠️ <b>Falix</b> 两次后仍为 <code>${status3}</code>`);
                }
              }

            } catch (err) {
              console.error('❌ 出错:', err.message);
              await shot(page, 'error');
              await sendTelegram(`❌ <b>Falix</b> 出错: ${err.message}`);
              process.exit(1);
            } finally {
              await browser.close().catch(() => {});
            }
          }

          main();
          EOF
          node run.mjs

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: falix-screenshots
          path: /tmp/screenshots/
          retention-days: 3
