name: Falix Auto Start

on:
  workflow_dispatch:
  repository_dispatch:
    types: [falix-start]

jobs:
  start-server:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm init -y
          npm install playwright-core

      - name: Install Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -qq
          sudo apt-get install -y google-chrome-stable

      - name: Run Falix Auto Start
        env:
          FALIX_EMAIL: ${{ secrets.FALIX_EMAIL }}
          FALIX_PASSWORD: ${{ secrets.FALIX_PASSWORD }}
          FALIX_SERVER_ID: ${{ secrets.FALIX_SERVER_ID }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          cat > run.mjs << 'EOF'
          import { chromium } from 'playwright-core';
          import { spawn } from 'child_process';
          import fs from 'fs';

          const EMAIL    = process.env.FALIX_EMAIL;
          const PASSWORD = process.env.FALIX_PASSWORD;
          const SERVER_ID = process.env.FALIX_SERVER_ID;
          const TG_TOKEN  = process.env.TG_TOKEN;
          const TG_CHAT_ID = process.env.TG_CHAT_ID;

          const SERVER_URL = `https://client.falixnodes.net/server/${SERVER_ID}/console`;
          const LOGIN_URL  = 'https://client.falixnodes.net/auth/login';

          // ── 工具 ─────────────────────────────────────────────────────────

          function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

          async function sendTelegram(msg) {
            if (!TG_TOKEN || !TG_CHAT_ID) return;
            try {
              const res = await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: TG_CHAT_ID, text: msg, parse_mode: 'HTML' })
              });
              const d = await res.json();
              if (!d.ok) console.log('TG 失败:', JSON.stringify(d));
            } catch (e) { console.log('TG 异常:', e.message); }
          }

          // ── 启动 Chrome（用 spawn 避免 execSync 后台进程问题）────────────

          function launchChrome(chromePath, debugPort) {
            return new Promise((resolve, reject) => {
              const args = [
                `--remote-debugging-port=${debugPort}`,
                '--no-sandbox',
                '--disable-setuid-sandbox',
                '--disable-dev-shm-usage',
                '--disable-blink-features=AutomationControlled',
                '--disable-infobars',
                '--window-size=1280,800',
                '--user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36',
                '--lang=zh-CN,zh',
                `--user-data-dir=/tmp/chrome-falix-${Date.now()}`,
                'about:blank'
              ];
              const proc = spawn(chromePath, args, {
                detached: true,
                stdio: 'ignore'
              });
              proc.unref();
              proc.on('error', reject);
              // 给 Chrome 一点时间绑定调试端口
              setTimeout(resolve, 3000);
            });
          }

          function findChrome() {
            for (const p of [
              '/usr/bin/google-chrome-stable',
              '/usr/bin/google-chrome',
              '/usr/bin/chromium-browser',
              '/usr/bin/chromium'
            ]) {
              if (fs.existsSync(p)) return p;
            }
            throw new Error('找不到 Chrome 可执行文件');
          }

          // ── CDP 鼠标 ──────────────────────────────────────────────────────

          async function cdpMouseMove(client, fromX, fromY, toX, toY, steps = 20) {
            for (let i = 0; i <= steps; i++) {
              const x = fromX + (toX - fromX) * (i / steps) + (Math.random() - 0.5) * 2;
              const y = fromY + (toY - fromY) * (i / steps) + (Math.random() - 0.5) * 2;
              await client.send('Input.dispatchMouseEvent', {
                type: 'mouseMoved', x, y, modifiers: 0, buttons: 0, button: 'none', clickCount: 0
              });
              await sleep(10 + Math.random() * 20);
            }
          }

          async function cdpClick(client, x, y) {
            await cdpMouseMove(client, x - 60 + Math.random() * 30, y + Math.random() * 10, x, y, 18);
            await sleep(60 + Math.random() * 100);
            await client.send('Input.dispatchMouseEvent', {
              type: 'mousePressed', x, y, modifiers: 0, button: 'left', buttons: 1, clickCount: 1
            });
            await sleep(80 + Math.random() * 80);
            await client.send('Input.dispatchMouseEvent', {
              type: 'mouseReleased', x, y, modifiers: 0, button: 'left', buttons: 0, clickCount: 1
            });
          }

          async function cdpType(client, page, selector, text) {
            await page.focus(selector);
            await sleep(300);
            for (const char of text) {
              await client.send('Input.dispatchKeyEvent', { type: 'keyDown', text: char });
              await sleep(40 + Math.random() * 60);
              await client.send('Input.dispatchKeyEvent', { type: 'keyUp', text: char });
              await sleep(20 + Math.random() * 40);
            }
          }

          // ── Turnstile ─────────────────────────────────────────────────────

          async function getTurnstilePos(page) {
            return page.evaluate(() => {
              // 先找 challenges.cloudflare.com 的 iframe
              const iframes = document.querySelectorAll('iframe[src*="challenges.cloudflare.com"]');
              for (const f of iframes) {
                const r = f.getBoundingClientRect();
                if (r.width > 0 && r.height > 0) return { x: r.left + 25, y: r.top + r.height / 2 };
              }
              // 再找 cf-turnstile 容器
              for (const sel of ['[data-sitekey]', 'cf-turnstile', '.cf-turnstile']) {
                for (const w of document.querySelectorAll(sel)) {
                  const iframe = w.querySelector('iframe') || w.shadowRoot?.querySelector('iframe');
                  if (iframe) {
                    const r = iframe.getBoundingClientRect();
                    if (r.width > 0) return { x: r.left + 25, y: r.top + r.height / 2 };
                  }
                }
              }
              return null;
            });
          }

          async function waitTurnstilePass(page, timeoutMs = 25000) {
            const end = Date.now() + timeoutMs;
            while (Date.now() < end) {
              const ok = await page.evaluate(() => {
                const inputs = document.querySelectorAll(
                  'input[name="cf-turnstile-response"], textarea[name="cf-turnstile-response"]'
                );
                return [...inputs].some(i => i.value && i.value.length > 10);
              });
              if (ok) return true;
              await sleep(600);
            }
            return false;
          }

          // ── 状态检测 ──────────────────────────────────────────────────────

          async function getServerStatus(page) {
            return page.evaluate(() => {
              // 精确匹配单个文本节点
              const walk = (root) => {
                const iter = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
                let node;
                while ((node = iter.nextNode())) {
                  const t = node.textContent.trim().toLowerCase();
                  if (t === 'offline')  return 'offline';
                  if (t === 'starting') return 'starting';
                  if (t === 'online')   return 'online';
                  if (t === 'running')  return 'online';
                }
                return null;
              };
              // 优先查底部状态栏区域
              for (const sel of ['.server-status', '[class*="status"]', '[class*="badge"]', '.badge']) {
                for (const el of document.querySelectorAll(sel)) {
                  const r = walk(el);
                  if (r) return r;
                }
              }
              return walk(document.body) || 'unknown';
            });
          }

          // ── 广告弹窗处理 ──────────────────────────────────────────────────

          async function dismissAd(page) {
            try {
              // 找 Cancel 按钮（广告弹窗里的）
              const btns = await page.$$('button');
              for (const btn of btns) {
                const txt = (await btn.textContent())?.trim().toLowerCase();
                if (txt === 'cancel') {
                  console.log('  🚫 关闭广告弹窗...');
                  await btn.click();
                  await sleep(1000);
                  return true;
                }
              }
            } catch {}
            return false;
          }

          // ── 点击 Start ────────────────────────────────────────────────────

          async function clickStart(page, client) {
            await dismissAd(page);
            const btns = await page.$$('button');
            for (const btn of btns) {
              const txt = (await btn.textContent())?.trim().toLowerCase();
              if (txt === 'start') {
                const box = await btn.boundingBox();
                if (box) {
                  console.log('  ▶️  点击 Start...');
                  await cdpClick(client, box.x + box.width / 2, box.y + box.height / 2);
                  await sleep(2000);
                  await dismissAd(page); // 立刻检查广告弹窗
                  return true;
                }
              }
            }
            console.log('  ⚠️  未找到 Start 按钮');
            return false;
          }

          // ── 主流程 ────────────────────────────────────────────────────────

          async function main() {
            const chromePath = findChrome();
            console.log(`🚀 使用 Chrome: ${chromePath}`);

            const debugPort = 9222;
            await launchChrome(chromePath, debugPort);
            console.log('✅ Chrome 已启动');

            const browser = await chromium.connectOverCDP(`http://localhost:${debugPort}`);
            const context = browser.contexts()[0];
            const page    = context.pages()[0] || await context.newPage();
            const client  = await page.context().newCDPSession(page);

            try {
              // ── 登录 ────────────────────────────────────────────────────
              console.log('📋 打开登录页...');
              await page.goto(LOGIN_URL, { waitUntil: 'domcontentloaded', timeout: 30000 });
              await sleep(2500);

              console.log('✏️  填写邮箱...');
              await cdpType(client, page,
                'input[name="email"], input[type="email"], input[placeholder*="email" i]',
                EMAIL
              );
              await sleep(400 + Math.random() * 300);

              console.log('✏️  填写密码...');
              await cdpType(client, page,
                'input[name="password"], input[type="password"]',
                PASSWORD
              );
              await sleep(400 + Math.random() * 300);

              // 处理 Turnstile
              console.log('🤖 处理 Cloudflare Turnstile...');
              let turnstileOk = false;
              for (let i = 0; i < 6; i++) {
                const pos = await getTurnstilePos(page);
                if (pos) {
                  console.log(`  点击 checkbox (${pos.x.toFixed(0)}, ${pos.y.toFixed(0)})...`);
                  await cdpClick(client, pos.x, pos.y);
                  turnstileOk = await waitTurnstilePass(page, 10000);
                  if (turnstileOk) { console.log('  ✅ Turnstile 通过'); break; }
                } else {
                  console.log(`  等待 Turnstile 加载 (${i + 1}/6)...`);
                }
                await sleep(2000);
              }
              if (!turnstileOk) console.log('⚠️  Turnstile 未明确通过，继续提交...');

              await sleep(500);

              // 提交登录
              console.log('🔑 提交登录...');
              const loginBtn = await page.$('button[type="submit"]');
              if (loginBtn) {
                const box = await loginBtn.boundingBox();
                if (box) await cdpClick(client, box.x + box.width / 2, box.y + box.height / 2);
              } else {
                await page.keyboard.press('Enter');
              }

              try {
                await page.waitForNavigation({ timeout: 20000, waitUntil: 'domcontentloaded' });
              } catch { await sleep(5000); }

              const afterUrl = page.url();
              console.log('当前 URL:', afterUrl);

              if (afterUrl.includes('/auth/login')) {
                await page.screenshot({ path: '/tmp/login_fail.png' });
                await sendTelegram('❌ <b>Falix</b> 登录失败，请检查账号密码或 Turnstile');
                process.exit(1);
              }
              console.log('✅ 登录成功！');

              // ── 跳转控制台 ───────────────────────────────────────────────
              console.log(`🖥️  跳转: ${SERVER_URL}`);
              await page.goto(SERVER_URL, { waitUntil: 'domcontentloaded', timeout: 30000 });
              await sleep(3000);

              // ── 检测状态 ─────────────────────────────────────────────────
              const status = await getServerStatus(page);
              console.log(`📊 当前状态: ${status}`);

              if (status === 'starting' || status === 'online') {
                console.log('✅ 服务器已运行/启动中，无需操作。');
                await sendTelegram(`✅ <b>Falix</b> 服务器状态 <code>${status}</code>，无需操作。`);
                process.exit(0);
              }

              // offline / unknown → 启动
              console.log('🔴 服务器 Offline，开始启动...');
              await clickStart(page, client);

              console.log('⏳ 等待 15 秒...');
              await sleep(15000);
              await page.reload({ waitUntil: 'domcontentloaded', timeout: 20000 });
              await sleep(2000);

              const status2 = await getServerStatus(page);
              console.log(`📊 15 秒后状态: ${status2}`);

              if (status2 === 'starting' || status2 === 'online') {
                await page.screenshot({ path: '/tmp/ok.png' });
                await sendTelegram(`✅ <b>Falix</b> 启动成功，状态: <code>${status2}</code>`);
                console.log('✅ 启动成功！');
              } else {
                // 再试一次
                console.log('⚠️  状态未变，再次点击 Start...');
                await clickStart(page, client);
                await sleep(8000);
                await page.reload({ waitUntil: 'domcontentloaded', timeout: 20000 });
                await sleep(2000);

                const status3 = await getServerStatus(page);
                console.log(`📊 最终状态: ${status3}`);
                await page.screenshot({ path: '/tmp/final.png' });

                if (status3 === 'starting' || status3 === 'online') {
                  await sendTelegram(`✅ <b>Falix</b> 二次启动成功，状态: <code>${status3}</code>`);
                } else {
                  await sendTelegram(`⚠️ <b>Falix</b> 两次启动后状态仍为 <code>${status3}</code>，请手动检查`);
                }
              }

            } catch (err) {
              console.error('❌ 出错:', err.message);
              try { await page.screenshot({ path: '/tmp/error.png' }); } catch {}
              await sendTelegram(`❌ <b>Falix</b> 工作流出错: ${err.message}`);
              process.exit(1);
            } finally {
              await browser.close().catch(() => {});
            }
          }

          main();
          EOF
          node run.mjs
