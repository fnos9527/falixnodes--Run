name: Falix Auto Start

on:
  workflow_dispatch:
  repository_dispatch:
    types: [falix-start]

jobs:
  start-server:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y xvfb

      - name: Install Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -qq
          sudo apt-get install -y google-chrome-stable
          google-chrome-stable --version

      - name: Install Node dependencies
        run: |
          npm init -y
          npm install puppeteer-real-browser puppeteer-core

      - name: Run Falix Auto Start
        env:
          FALIX_EMAIL: ${{ secrets.FALIX_EMAIL }}
          FALIX_PASSWORD: ${{ secrets.FALIX_PASSWORD }}
          FALIX_SERVER_ID: ${{ secrets.FALIX_SERVER_ID }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          cat > run.mjs << 'EOF'
          import { connect } from 'puppeteer-real-browser';
          import fs from 'fs';

          const EMAIL      = process.env.FALIX_EMAIL;
          const PASSWORD   = process.env.FALIX_PASSWORD;
          const SERVER_ID  = process.env.FALIX_SERVER_ID;
          const TG_TOKEN   = process.env.TG_TOKEN;
          const TG_CHAT_ID = process.env.TG_CHAT_ID;

          const LOGIN_URL  = 'https://client.falixnodes.net/auth/login';
          const SERVER_URL = `https://client.falixnodes.net/server/${SERVER_ID}/console`;

          const sleep = ms => new Promise(r => setTimeout(r, ms));

          const SHOT_DIR = '/tmp/screenshots';
          fs.mkdirSync(SHOT_DIR, { recursive: true });

          async function shot(page, name) {
            try {
              await page.screenshot({ path: `${SHOT_DIR}/${name}.png`, fullPage: true });
              console.log(`  📸 ${name}`);
            } catch (e) { console.log(`  📸 失败(${name}): ${e.message}`); }
          }

          async function sendTelegram(msg) {
            if (!TG_TOKEN || !TG_CHAT_ID) return;
            try {
              await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: TG_CHAT_ID, text: msg, parse_mode: 'HTML' })
              });
            } catch (e) { console.log('TG 失败:', e.message); }
          }

          async function humanType(page, selector, text) {
            await page.focus(selector);
            await sleep(200);
            for (const char of text) {
              await page.keyboard.type(char, { delay: 40 + Math.random() * 60 });
            }
          }

          // ── Turnstile 点击：CDP 穿透 Shadow DOM ───────────────────────────
          // 从截图可见 Turnstile widget 在主页面（非 iframe），checkbox 在 Shadow DOM 里
          // 用 CDP Input.dispatchMouseEvent 模拟点击，绕过 Shadow DOM 限制

          async function clickTurnstileViaCDP(page) {
            // 先尝试从主页面找 Turnstile iframe/widget 的屏幕坐标
            for (let attempt = 0; attempt < 20; attempt++) {

              // 方案A：主页面直接找 cf-turnstile 容器的位置，用绝对坐标点击 checkbox 区域
              const pos = await page.evaluate(() => {
                // 找 Turnstile 容器（各种选择器）
                const selectors = [
                  'cf-turnstile',
                  '[data-sitekey]',
                  '.cf-turnstile',
                  'iframe[src*="challenges.cloudflare.com"]',
                  'iframe[src*="turnstile"]',
                ];
                for (const sel of selectors) {
                  const el = document.querySelector(sel);
                  if (el) {
                    const r = el.getBoundingClientRect();
                    if (r.width > 0 && r.height > 0) {
                      // checkbox 通常在 widget 左侧，约 x+24, y+中间
                      return {
                        x: r.left + 24,
                        y: r.top + r.height / 2,
                        w: r.width,
                        h: r.height,
                        tag: el.tagName
                      };
                    }
                  }
                }
                return null;
              });

              if (pos) {
                console.log(`  >> 找到 Turnstile widget (${pos.tag}): rect=(${pos.x.toFixed(0)},${pos.y.toFixed(0)}) size=${pos.w.toFixed(0)}x${pos.h.toFixed(0)})`);

                // 用 CDP 发送真实鼠标事件（穿透 Shadow DOM）
                const cdpClient = await page.target().createCDPSession();

                // 移动鼠标到附近
                await cdpClient.send('Input.dispatchMouseEvent', {
                  type: 'mouseMoved', x: pos.x - 40, y: pos.y,
                  modifiers: 0, buttons: 0, button: 'none', clickCount: 0
                });
                await sleep(100);
                for (let step = 1; step <= 10; step++) {
                  await cdpClient.send('Input.dispatchMouseEvent', {
                    type: 'mouseMoved',
                    x: (pos.x - 40) + (40 * step / 10),
                    y: pos.y + (Math.random() - 0.5) * 2,
                    modifiers: 0, buttons: 0, button: 'none', clickCount: 0
                  });
                  await sleep(15 + Math.random() * 15);
                }
                await sleep(80 + Math.random() * 60);

                // 点击
                await cdpClient.send('Input.dispatchMouseEvent', {
                  type: 'mousePressed', x: pos.x, y: pos.y,
                  modifiers: 0, button: 'left', buttons: 1, clickCount: 1
                });
                await sleep(80 + Math.random() * 60);
                await cdpClient.send('Input.dispatchMouseEvent', {
                  type: 'mouseReleased', x: pos.x, y: pos.y,
                  modifiers: 0, button: 'left', buttons: 0, clickCount: 1
                });

                await cdpClient.detach();
                console.log(`  >> CDP 点击已发送`);
                return true;
              }

              // 方案B：遍历所有 frames 找 Turnstile（兼容嵌套 iframe 情况）
              const allFrames = page.frames();
              for (const frame of allFrames) {
                try {
                  const frameUrl = frame.url();
                  if (!frameUrl.includes('challenges.cloudflare.com') &&
                      !frameUrl.includes('turnstile')) continue;

                  const iframeEl = await frame.frameElement();
                  if (!iframeEl) continue;
                  const box = await iframeEl.boundingBox();
                  if (!box || box.width === 0) continue;

                  // checkbox 在 iframe 左侧约 24px
                  const cx = box.x + 24;
                  const cy = box.y + box.height / 2;
                  console.log(`  >> 在 frame 里找到 Turnstile: (${cx.toFixed(0)}, ${cy.toFixed(0)})`);

                  const cdpClient = await page.target().createCDPSession();
                  await cdpClient.send('Input.dispatchMouseEvent', {
                    type: 'mousePressed', x: cx, y: cy,
                    modifiers: 0, button: 'left', buttons: 1, clickCount: 1
                  });
                  await sleep(80);
                  await cdpClient.send('Input.dispatchMouseEvent', {
                    type: 'mouseReleased', x: cx, y: cy,
                    modifiers: 0, button: 'left', buttons: 0, clickCount: 1
                  });
                  await cdpClient.detach();
                  return true;
                } catch {}
              }

              if (attempt % 5 === 4) {
                // 每5秒截一张图看 Turnstile 状态
                await shot(page, `turnstile_debug_${attempt + 1}s`);
                // 打印页面上所有 iframe src，帮助诊断
                const iframeSrcs = await page.evaluate(() =>
                  [...document.querySelectorAll('iframe')].map(f => f.src)
                ).catch(() => []);
                console.log(`  >> iframes: ${JSON.stringify(iframeSrcs)}`);
              }

              await sleep(1000);
            }
            return false;
          }

          async function waitTurnstileSuccess(page, timeoutMs = 15000) {
            const end = Date.now() + timeoutMs;
            while (Date.now() < end) {
              const ok = await page.evaluate(() => {
                const inputs = document.querySelectorAll(
                  'input[name="cf-turnstile-response"], textarea[name="cf-turnstile-response"]'
                );
                return [...inputs].some(i => i.value && i.value.length > 10);
              }).catch(() => false);
              if (ok) return true;

              for (const frame of page.frames()) {
                if (!frame.url().includes('cloudflare') && !frame.url().includes('turnstile')) continue;
                try {
                  const text = await frame.evaluate(() => document.body?.innerText || '').catch(() => '');
                  if (text.includes('Success')) return true;
                } catch {}
              }
              await sleep(500);
            }
            return false;
          }

          async function getServerStatus(page) {
            return page.evaluate(() => {
              function walkText(root) {
                const iter = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
                let node;
                while ((node = iter.nextNode())) {
                  const t = node.textContent.trim().toLowerCase();
                  if (t === 'offline')  return 'offline';
                  if (t === 'starting') return 'starting';
                  if (t === 'online' || t === 'running') return 'online';
                }
                return null;
              }
              for (const sel of ['.server-status', '[class*="status"]', '[class*="badge"]', '.badge']) {
                for (const el of document.querySelectorAll(sel)) {
                  const r = walkText(el);
                  if (r) return r;
                }
              }
              return walkText(document.body) || 'unknown';
            });
          }

          async function dismissAd(page) {
            try {
              for (const btn of await page.$$('button')) {
                const txt = (await btn.evaluate(el => el.textContent))?.trim().toLowerCase();
                if (txt === 'cancel') {
                  console.log('  🚫 关闭广告');
                  await btn.click();
                  await sleep(1000);
                  return true;
                }
              }
            } catch {}
            return false;
          }

          async function clickStart(page) {
            await dismissAd(page);
            for (const btn of await page.$$('button')) {
              const txt = (await btn.evaluate(el => el.textContent))?.trim().toLowerCase();
              if (txt === 'start') {
                const box = await btn.boundingBox();
                if (box) {
                  console.log('  ▶️  点击 Start');
                  await page.mouse.move(box.x + box.width / 2, box.y + box.height / 2, { steps: 10 });
                  await sleep(100);
                  await page.mouse.click(box.x + box.width / 2, box.y + box.height / 2);
                  await sleep(2000);
                  await dismissAd(page);
                  return true;
                }
              }
            }
            console.log('  ⚠️  未找到 Start 按钮');
            return false;
          }

          async function main() {
            console.log('🚀 启动浏览器...');
            const { browser, page } = await connect({
              headless: false,
              turnstile: false,
              disableXvfb: false,
              args: [
                '--no-sandbox',
                '--disable-setuid-sandbox',
                '--disable-dev-shm-usage',
                '--disable-gpu',
                '--window-size=1280,800',
                '--lang=zh-CN,zh',
              ],
              customConfig: { chromePath: '/usr/bin/google-chrome-stable' },
              connectOption: {
                defaultViewport: { width: 1280, height: 800 },
                protocolTimeout: 60000,
              },
            });
            console.log('✅ 浏览器已启动');

            try {
              // ── 登录页 ────────────────────────────────────────────────────
              console.log('📋 打开登录页...');
              await page.goto(LOGIN_URL, { waitUntil: 'domcontentloaded', timeout: 30000 });
              await sleep(2000);
              await shot(page, '01_login_page');

              // 填邮箱
              console.log('✏️  填写邮箱...');
              await humanType(page, 'input[name="email"], input[type="email"]', EMAIL);
              await sleep(400);

              // 填密码
              console.log('✏️  填写密码...');
              await humanType(page, 'input[name="password"], input[type="password"]', PASSWORD);
              await sleep(400);
              await shot(page, '02_filled_credentials');

              // 点 Turnstile（账密填完之后）
              console.log('🤖 点击 Turnstile...');
              const clicked = await clickTurnstileViaCDP(page);
              if (clicked) {
                console.log('  >> 等待验证结果...');
                const ok = await waitTurnstileSuccess(page, 15000);
                if (ok) {
                  console.log('  ✅ Turnstile 验证通过');
                } else {
                  console.log('  ⚠️  Turnstile 未确认通过，尝试继续...');
                }
              } else {
                console.log('  ⚠️  未找到 Turnstile，直接提交...');
              }
              await shot(page, '03_after_turnstile');

              // 立刻提交
              console.log('🔑 提交登录...');
              const loginBtn = await page.$('button[type="submit"]');
              if (loginBtn) {
                await loginBtn.click();
              } else {
                await page.keyboard.press('Enter');
              }

              try {
                await page.waitForNavigation({ timeout: 20000, waitUntil: 'domcontentloaded' });
              } catch { await sleep(5000); }

              const afterUrl = page.url();
              console.log('当前 URL:', afterUrl);
              await shot(page, '04_after_login');

              if (afterUrl.includes('/auth/login')) {
                const errText = await page.evaluate(() => {
                  const els = document.querySelectorAll('.alert, .error, [class*="error"], [class*="alert"], [role="alert"]');
                  return [...els].map(e => e.textContent?.trim()).filter(Boolean).join(' | ');
                }).catch(() => '');
                console.log('❌ 登录失败:', errText || '(无错误文字)');
                await sendTelegram(`❌ <b>Falix</b> 登录失败: ${errText || '未知'}`);
                process.exit(1);
              }
              console.log('✅ 登录成功！');

              // ── 控制台 ────────────────────────────────────────────────────
              console.log(`🖥️  跳转: ${SERVER_URL}`);
              await page.goto(SERVER_URL, { waitUntil: 'domcontentloaded', timeout: 30000 });
              await sleep(3000);
              await shot(page, '05_console');

              const status = await getServerStatus(page);
              console.log(`📊 当前状态: ${status}`);

              if (status === 'starting' || status === 'online') {
                console.log('✅ 服务器运行中，无需操作。');
                await sendTelegram(`✅ <b>Falix</b> 状态 <code>${status}</code>，无需操作。`);
                process.exit(0);
              }

              console.log('🔴 Offline，启动...');
              await clickStart(page);
              await shot(page, '06_after_start');

              console.log('⏳ 等待 15 秒...');
              await sleep(15000);
              await page.reload({ waitUntil: 'domcontentloaded' });
              await sleep(2000);

              const status2 = await getServerStatus(page);
              console.log(`📊 15s 后: ${status2}`);
              await shot(page, '07_after_15s');

              if (status2 === 'starting' || status2 === 'online') {
                await sendTelegram(`✅ <b>Falix</b> 启动成功，状态: <code>${status2}</code>`);
              } else {
                console.log('⚠️  再次点击 Start...');
                await clickStart(page);
                await sleep(8000);
                await page.reload({ waitUntil: 'domcontentloaded' });
                await sleep(2000);
                const status3 = await getServerStatus(page);
                console.log(`📊 最终: ${status3}`);
                await shot(page, '08_final');
                if (status3 === 'starting' || status3 === 'online') {
                  await sendTelegram(`✅ <b>Falix</b> 二次启动成功，状态: <code>${status3}</code>`);
                } else {
                  await sendTelegram(`⚠️ <b>Falix</b> 两次后仍为 <code>${status3}</code>`);
                }
              }

            } catch (err) {
              console.error('❌ 出错:', err.message);
              await shot(page, 'error');
              await sendTelegram(`❌ <b>Falix</b> 出错: ${err.message}`);
              process.exit(1);
            } finally {
              await browser.close().catch(() => {});
            }
          }

          main();
          EOF
          node run.mjs

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: falix-screenshots
          path: /tmp/screenshots/
          retention-days: 3
